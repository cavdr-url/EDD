<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${resource.id == null ? 'Nueva Mascota' : 'Editar Mascota'}">Formulario Mascota</title>
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" th:href="@{/images/logo_EDD.jpeg}">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- WatchBootstrap Theme -->
    <link rel="stylesheet" href="https://bootswatch.com/5/materia/bootstrap.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/panel.css}">
</head>
<body>
    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand mb-0 h1" href="#">
                <img th:src="@{/images/logo_EDD.jpeg}" alt="Logo" width="30" height="30" class="d-inline-block align-text-top rounded-circle me-2">
                Gestión de Mascotas
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a th:href="@{/admin/panel}" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> Volver al Panel</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12 col-md-10 col-lg-8 mx-auto">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3 class="card-title" th:text="${resource.id == null ? 'Nueva Mascota' : 'Editar Mascota'}">Formulario</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="${resource.id == null ? '/mascotas' : '/mascotas/' + resource.id}" 
                              th:object="${resource}" method="post" enctype="multipart/form-data">
                            
                            <input type="hidden" th:field="*{id}" />
                            
                            <div class="mb-3">
                                <label for="nombre">Nombre:</label>
                                <input type="text" id="nombre" th:field="*{nombre}" 
                                       class="form-control" placeholder="Nombre de la mascota" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="raza">Raza / Especie:</label>
                                <select id="raza" th:field="*{raza}" class="form-select" required>
                                    <option value="">Selecciona una raza/especie</option>
                                    <optgroup label="🐕 Perros">
                                        <option value="Labrador Retriever">Labrador Retriever</option>
                                        <option value="Golden Retriever">Golden Retriever</option>
                                        <option value="German Shepherd">German Shepherd (Pastor Alemán)</option>
                                        <option value="Bulldog">Bulldog</option>
                                        <option value="Poodle">Poodle (Caniche)</option>
                                        <option value="Beagle">Beagle</option>
                                        <option value="Rottweiler">Rottweiler</option>
                                        <option value="Dachshund">Dachshund (Salchicha)</option>
                                        <option value="Boxer">Boxer</option>
                                        <option value="Shih Tzu">Shih Tzu</option>
                                        <option value="Chihuahua">Chihuahua</option>
                                        <option value="Siberian Husky">Siberian Husky</option>
                                        <option value="Great Dane">Great Dane (Dogo Alemán)</option>
                                        <option value="Doberman">Doberman</option>
                                        <option value="Pug">Pug (Carlino)</option>
                                        <option value="Corgi">Corgi</option>
                                        <option value="Border Collie">Border Collie</option>
                                        <option value="Australian Shepherd">Australian Shepherd</option>
                                        <option value="Dalmatian">Dalmatian (Dálmata)</option>
                                        <option value="Pitbull">Pitbull</option>
                                        <option value="Yorkshire Terrier">Yorkshire Terrier</option>
                                        <option value="Maltese">Maltese (Maltés)</option>
                                        <option value="Pomeranian">Pomeranian</option>
                                        <option value="Saint Bernard">Saint Bernard (San Bernardo)</option>
                                        <option value="Newfoundland">Newfoundland (Terranova)</option>
                                        <option value="Akita">Akita</option>
                                        <option value="Chow Chow">Chow Chow</option>
                                        <option value="Cavalier King Charles">Cavalier King Charles</option>
                                        <option value="Boston Terrier">Boston Terrier</option>
                                        <option value="Weimaraner">Weimaraner</option>
                                    </optgroup>
                                    <optgroup label="🐈 Gatos">
                                        <option value="Persian">Persian (Persa)</option>
                                        <option value="Siamese">Siamese (Siamés)</option>
                                        <option value="Maine Coon">Maine Coon</option>
                                        <option value="British Shorthair">British Shorthair</option>
                                        <option value="Ragdoll">Ragdoll</option>
                                        <option value="Bengal">Bengal</option>
                                        <option value="Abyssinian">Abyssinian (Abisinio)</option>
                                        <option value="Scottish Fold">Scottish Fold</option>
                                        <option value="Sphynx">Sphynx</option>
                                        <option value="Russian Blue">Russian Blue (Azul Ruso)</option>
                                        <option value="Norwegian Forest">Norwegian Forest (Bosque de Noruega)</option>
                                        <option value="Birman">Birman (Birmano)</option>
                                        <option value="Devon Rex">Devon Rex</option>
                                        <option value="Oriental Shorthair">Oriental Shorthair</option>
                                        <option value="Burmese">Burmese (Birmano)</option>
                                    </optgroup>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label for="edadAproximada">Edad Aproximada (meses):</label>
                                <input type="number" id="edadAproximada" th:field="*{edadAproximada}" 
                                       class="form-control" placeholder="Edad en meses" min="0">
                            </div>
                            
                            <div class="mb-3">
                                <label for="fechaIngreso">Fecha de Ingreso:</label>
                                <input type="date" id="fechaIngreso" th:field="*{fechaIngreso}" 
                                       class="form-control" 
                                       th:value="${#temporals.format(resource.fechaIngreso, 'yyyy-MM-dd')}">
                            </div>
                            
                            <div class="mb-3">
                                <label for="observaciones">Observaciones:</label>
                                <textarea id="observaciones" th:field="*{observaciones}" 
                                          class="form-control" rows="3" 
                                          placeholder="Notas importantes sobre la mascota"></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label for="imagenFile">Foto de la Mascota:</label>
                                <input type="file" id="imagenFile" name="imagenFile" 
                                       class="form-control" accept="image/*">
                                <small class="text-muted">Tamaño máximo: 1MB. Formatos: JPG, PNG, GIF</small>
                                <!-- Preview de imagen actual en edición -->
                                <div th:if="${resource.imagen}" class="mt-2">
                                    <img th:src="${resource.imagen}" alt="Imagen actual" 
                                         class="img-thumbnail" style="max-width: 200px; max-height: 200px;">
                                    <p class="text-muted small">Imagen actual</p>
                                </div>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <button type="submit" class="btn btn-success me-2"><i class="fas fa-save"></i> Guardar</button>
                                <a th:href="@{/admin/panel}" class="btn btn-secondary"><i class="fas fa-times"></i> Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery and Bootstrap JS (Bootstrap 5) -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Script personalizado para auto-establecer fecha -->
    <script th:src="@{/js/mascota-form.js}"></script>
</body>
</html>
