<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${resource.id == null ? 'Nueva Mascota' : 'Editar Mascota'}">Formulario Mascota</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- WatchBootstrap Theme -->
    <link rel="stylesheet" href="https://bootswatch.com/5/materia/bootstrap.min.css">
</head>
<body>
    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand mb-0 h1" href="#"><i class="fas fa-paw"></i> Gestión de Mascotas</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a th:href="@{/admin/panel}" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> Volver al Panel</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12 col-md-10 col-lg-8 mx-auto">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3 class="card-title" th:text="${resource.id == null ? 'Nueva Mascota' : 'Editar Mascota'}">Formulario</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="${resource.id == null ? '/mascotas' : '/mascotas/' + resource.id}" 
                              th:object="${resource}" method="post">
                            
                            <input type="hidden" th:field="*{id}" />
                            
                            <div class="mb-3">
                                <label for="nombre">Nombre:</label>
                                <input type="text" id="nombre" th:field="*{nombre}" 
                                       class="form-control" placeholder="Nombre de la mascota" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="codigo">Código:</label>
                                <input type="text" id="codigo" th:field="*{codigo}" 
                                       class="form-control" placeholder="Código de identificación" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="raza">Raza:</label>
                                <input type="text" id="raza" th:field="*{raza}" 
                                       class="form-control" placeholder="Raza de la mascota">
                            </div>
                            
                            <div class="mb-3">
                                <label for="edadAproximada">Edad Aproximada (meses):</label>
                                <input type="number" id="edadAproximada" th:field="*{edadAproximada}" 
                                       class="form-control" placeholder="Edad en meses" min="0">
                            </div>
                            
                            <div class="mb-3">
                                <label for="fechaIngreso">Fecha de Ingreso:</label>
                                <input type="date" id="fechaIngreso" th:field="*{fechaIngreso}" 
                                       class="form-control" 
                                       th:value="${#temporals.format(resource.fechaIngreso, 'yyyy-MM-dd')}">
                            </div>
                            
                            <div class="mb-3">
                                <label for="observaciones">Observaciones:</label>
                                <textarea id="observaciones" th:field="*{observaciones}" 
                                          class="form-control" rows="3" 
                                          placeholder="Notas importantes sobre la mascota"></textarea>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <button type="submit" class="btn btn-success me-2"><i class="fas fa-save"></i> Guardar</button>
                                <a th:href="@{/admin/panel}" class="btn btn-secondary"><i class="fas fa-times"></i> Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery and Bootstrap JS (Bootstrap 5) -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
