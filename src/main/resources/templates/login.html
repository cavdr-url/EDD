<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/images/logo_EDD.jpeg">
    <!-- Bootswatch Theme (Watch) -->
    <link rel="stylesheet" href="https://bootswatch.com/5/materia/bootstrap.min.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="card-header bg-primary text-white text-center">
                <!-- Logo en el login -->
                <div class="mb-2">
                    <img src="/images/logo_EDD.jpeg" alt="Logo" width="60" height="60" class="rounded-circle">
                </div>
                <h4 class="mb-0"><i class="fa fa-home" aria-hidden="true"></i> Refugio de mascotas</h4>
                <small>Iniciar Sesión</small>
            </div>
            <div class="card-body">
                <!-- Mensaje de error -->
                <div th:if="${param.error}" class="alert alert-danger">
                    Usuario o contraseña incorrectos.
                </div>
                
                <!-- Mensaje de logout -->
                <div th:if="${param.logout}" class="alert alert-success">
                    Has cerrado sesión correctamente.
                </div>
                
                <!-- Formulario de login -->
                <form th:action="@{/login}" method="post">
                    <div class="mb-1">
                        <label for="username">Usuario:</label>
                        <input type="text" id="username" name="username" 
                               class="form-control" 
                               placeholder="Ingresa tu usuario"
                               required autofocus>
                    </div>
                    
                    <div class="mb-1">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password" 
                               class="form-control" 
                               placeholder="Ingresa tu contraseña"
                               required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">
                        Ingresar
                    </button>
                </form>
                
                <hr>
                
                <div class="text-center">
                    <a th:href="@{/derechos}" class="btn btn-info btn-sm"><i class="fas fa-users"></i> Creadores</a>
                    <a href="https://www.facebook.com/share/14Wfu17PEZt/" target="_blank" class="btn btn-info btn-sm"><i class="fa-brands fa-facebook"></i> Página oficial</a>
                </div>
            </div>
        </div>
    </div>
    
    <!-- jQuery and Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
