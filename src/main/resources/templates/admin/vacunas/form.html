<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${vacuna.id != null ? 'Editar Vacuna' : 'Nueva Vacuna'}">Formulario de Vacuna</title>
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" th:href="@{/images/logo_EDD.jpeg}">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- WatchBootstrap Theme -->
    <link rel="stylesheet" href="https://bootswatch.com/5/materia/bootstrap.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/panel.css}">
</head>
<body>
    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand mb-0 h1" href="https://www.facebook.com/share/14Wfu17PEZt/" target="_blank">
                <img th:src="@{/images/logo_EDD.jpeg}" alt="Logo" width="30" height="30" class="d-inline-block align-text-top rounded-circle me-2">
                Gestión de Vacunas
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a th:href="@{/admin/panel}" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> Volver al Panel</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h3 class="card-title mb-0" th:text="${vacuna.id != null ? 'Editar Vacuna' : 'Nueva Vacuna'}">Formulario de Vacuna</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="${vacuna.id != null ? '/vacunas/' + vacuna.id : '/vacunas'}" 
                              th:object="${vacuna}" method="post">
                            
                            <input type="hidden" th:field="*{id}" />
                            
                            <div class="mb-3">
                                <label for="nombre">Nombre de la Vacuna:</label>
                                <input type="text" class="form-control" id="nombre" 
                                       th:field="*{nombre}" placeholder="Ej.: Rabia, Parvovirus" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="descripcion">Descripción:</label>
                                <textarea class="form-control" id="descripcion" 
                                          th:field="*{descripcion}" rows="3" 
                                          placeholder="Descripción opcional de la vacuna"></textarea>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <button type="submit" class="btn btn-success me-2">
                                    <i class="fas fa-save"></i> Guardar
                                </button>
                                <a th:href="@{/admin/panel}" class="btn btn-secondary">
                                    <i class="fas fa-times"></i> Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
