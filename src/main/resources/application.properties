## ============================================
## CONFIGURACIÓN DE BASE DE DATOS - POSTGRESQL
## ============================================

# Nota: Asegúrate de que tu DB_URL termine en: ?prepareThreshold=0
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

## ============================================
## CONFIGURACIÓN DEL POOL (HIKARI) - SOLUCIÓN ERROR 500
## ============================================

# Evita que las conexiones expiren en Supabase antes que en Spring (15 min)
spring.datasource.hikari.max-lifetime=900000

# Tiempo máximo para que una conexión inactiva sea eliminada (10 min)
spring.datasource.hikari.idle-timeout=600000

# Tiempo de espera para obtener una conexión del pool (30 seg)
spring.datasource.hikari.connection-timeout=30000

# Query de validación para asegurar que la conexión sigue viva
spring.datasource.hikari.connection-test-query=SELECT 1

# Tamaño del pool (ajusta según tus necesidades, 10 es el estándar)
spring.datasource.hikari.maximum-pool-size=10

## ============================================
## FIX PARA TRANSACTION POOLER (MODO SESIÓN/TRANSACCIÓN)
## ============================================

# Importante para que Hibernate no choque con el pooler de Supabase
spring.jpa.properties.hibernate.jdbc.prepare_connection=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true